<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="tab-title">Wheeboks | España District</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --primary: #00ff88; --card: #111111; --text: #ffffff; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; position: fixed; top: 0; width: 100%; box-sizing: border-box; background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid #222; }
        .nav-brand { font-weight: 800; font-size: 1.4rem; color: var(--primary); text-transform: uppercase; }
        .sidebar { position: fixed; top: 0; right: -100%; width: 280px; height: 100%; background: var(--card); z-index: 2000; transition: 0.4s; padding: 60px 20px; border-left: 1px solid #333; overflow-y: auto; }
        .sidebar.active { right: 0; }
        .sidebar-item { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; color: white; display: block; text-decoration: none; font-weight: 600; }
        .view { display: none; flex-direction: column; align-items: center; padding: 100px 20px 40px; min-height: 100vh; box-sizing: border-box; }
        .view.active { display: flex; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; width: 100%; max-width: 1100px; margin-top: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #222; border-left: 4px solid var(--primary); position: relative; }
        .tag { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 10px; background: var(--primary); color: #000; font-weight: 800; margin-bottom: 10px; }
        .card-meta { font-size: 0.7rem; opacity: 0.4; margin-top: 15px; border-top: 1px solid #222; padding-top: 10px; }
        .admin-box { background: var(--card); padding: 20px; border-radius: 15px; width: 100%; max-width: 550px; border: 1px solid #333; margin-bottom: 20px; }
        .admin-section { border-bottom: 1px solid #222; padding-bottom: 15px; margin-bottom: 15px; }
        .admin-section h4 { margin: 0 0 10px 0; color: var(--primary); font-size: 0.8rem; text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; background: #000; border: 1px solid #333; color: white; box-sizing: border-box; font-family: inherit; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--primary); color: #000; font-weight: 800; cursor: pointer; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; display: none; align-items: center; justify-content: center; }
        .delete-btn { color: #ff4444; font-size: 10px; cursor: pointer; margin-left: 10px; }
    </style>
</head>
<body>

    <header class="header">
        <div class="nav-brand" id="header-name">ESPAÑA DISTRICT</div>
        <div style="font-size: 28px; cursor: pointer;" onclick="toggleSidebar()">☰</div>
    </header>

    <div id="sidebar" class="sidebar">
        <div style="font-size: 30px; cursor: pointer; margin-bottom: 20px;" onclick="toggleSidebar()">×</div>
        <div id="dynamic-menu"></div>
        <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
        <div class="sidebar-item" style="color: var(--primary);" onclick="openLogin()">⚙️ Panel Admin</div>
    </div>

    <section id="view-home" class="view active">
        <img id="home-logo" src="" style="width: 120px; margin-bottom: 20px; display:none;">
        <h1 id="home-name">Wheeboks</h1>
        <p id="home-desc" style="opacity:0.6; text-align: center; max-width: 500px;">Conectando...</p>
        <div id="home-buttons" style="display:flex; gap:10px; margin-top:20px; flex-wrap: wrap; justify-content: center;"></div>
    </section>

    <section id="view-section" class="view">
        <h2 id="sec-title-view">Sección</h2>
        <div id="sub-filters" style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center;"></div>
        <div id="render-grid" class="grid"></div>
    </section>

    <div id="login-modal" class="overlay">
        <div class="admin-box" style="max-width:350px;">
            <h3>Acceso Staff</h3>
            <input type="text" id="st-user" placeholder="Tu Nombre">
            <input type="text" id="st-range" placeholder="Tu Rango">
            <input type="password" id="st-pass" placeholder="Clave">
            <button class="btn" onclick="checkLogin()">Entrar</button>
        </div>
    </div>

    <section id="view-admin" class="view">
        <div class="admin-box">
            <h2 style="margin:0 0 20px 0;">Panel Wheeboks</h2>
            
            <div class="admin-section">
                <h4>1. Wheeboks Log (Diseño Global)</h4>
                <input type="text" id="conf-name" placeholder="Nombre de la Web">
                <input type="text" id="conf-logo" placeholder="URL del Logo (Link)">
                <textarea id="conf-desc" placeholder="Descripción de bienvenida"></textarea>
                <button class="btn" onclick="saveLog()">Guardar Log</button>
            </div>

            <div class="admin-section">
                <h4>2. Categorías Principales</h4>
                <input type="text" id="new-cat-name" placeholder="Ej: Normativas">
                <button class="btn" style="background:white" onclick="addCat()">Añadir Categoría</button>
                <div id="list-cats" style="margin-top:10px; font-size:12px;"></div>
            </div>

            <div class="admin-section">
                <h4>3. Sub-Secciones (Roles/Tipos)</h4>
                <select id="sub-parent"></select>
                <input type="text" id="new-sub-name" placeholder="Ej: Roles de Mafia">
                <button class="btn" style="background:white" onclick="addSub()">Añadir Rol a Categoría</button>
            </div>

            <div class="admin-section">
                <h4>4. Publicar Contenido</h4>
                <select id="p-cat" onchange="updateSubSelect()"></select>
                <select id="p-sub"></select>
                <input type="text" id="p-title" placeholder="Título">
                <textarea id="p-desc" placeholder="Mensaje/Norma"></textarea>
                <button class="btn" onclick="publish()">Publicar Firmado</button>
            </div>

            <button class="btn" style="background:#222; color:white;" onclick="location.reload()">Cerrar Sesión</button>
        </div>
    </section>

    <script>
        // CREDENCIALES CARGADAS DESDE TUS FOTOS
        const firebaseConfig = {
            apiKey: "AIzaSyALZQFctcGybVPRnIVtGzMqZ0lFBUkZqC4",
            authDomain: "wheeboks-2896f.firebaseapp.com",
            projectId: "wheeboks-2896f",
            databaseURL: "https://wheeboks-2896f-default-rtdb.firebaseio.com",
            storageBucket: "wheeboks-2896f.firebasestorage.app",
            messagingSenderId: "484871203880",
            appId: "1:484871203880:web:5d611c8fae4deec19dd91d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let user = "", range = "";

        db.ref('wheeboks_system').on('value', (snap) => {
            const data = snap.val() || {};
            renderUI(data);
        });

        function renderUI(data) {
            const config = data.config || {name: "España District", desc: "Configura tu servidor en el panel"};
            const cats = data.categories || {};
            
            document.getElementById('header-name').innerText = config.name;
            document.getElementById('home-name').innerText = config.name;
            document.getElementById('home-desc').innerText = config.desc;
            if(config.logo) { document.getElementById('home-logo').src = config.logo; document.getElementById('home-logo').style.display='block'; }

            const menu = document.getElementById('dynamic-menu');
            const hBtns = document.getElementById('home-buttons');
            const pCat = document.getElementById('p-cat');
            const sParent = document.getElementById('sub-parent');
            const lCats = document.getElementById('list-cats');

            menu.innerHTML = `<div class="sidebar-item" onclick="goTo('home')">🏠 Inicio</div>`;
            hBtns.innerHTML = ""; pCat.innerHTML = ""; sParent.innerHTML = ""; lCats.innerHTML = "";

            for(let id in cats) {
                menu.innerHTML += `<div class="sidebar-item" onclick="openCat('${id}')">${cats[id]}</div>`;
                hBtns.innerHTML += `<button class="btn" style="width:auto; padding:10px 20px" onclick="openCat('${id}')">${cats[id]}</button>`;
                pCat.innerHTML += `<option value="${id}">${cats[id]}</option>`;
                sParent.innerHTML += `<option value="${id}">${cats[id]}</option>`;
                lCats.innerHTML += `<div>${cats[id]} <span class="delete-btn" onclick="delCat('${id}')">[X Eliminar]</span></div>`;
            }
            updateSubSelect();
        }

        function saveLog() {
            db.ref('wheeboks_system/config').set({
                name: document.getElementById('conf-name').value,
                logo: document.getElementById('conf-logo').value,
                desc: document.getElementById('conf-desc').value
            });
            alert("¡Diseño Guardado!");
        }

        function addCat() {
            const name = document.getElementById('new-cat-name').value;
            if(name) {
                db.ref('wheeboks_system/categories').push(name);
                document.getElementById('new-cat-name').value = "";
            }
        }

        function delCat(id) { if(confirm("¿Borrar sección?")) db.ref('wheeboks_system/categories/' + id).remove(); }

        function addSub() {
            const parent = document.getElementById('sub-parent').value;
            const name = document.getElementById('new-sub-name').value;
            if(name) {
                db.ref('wheeboks_system/subsections/' + parent).push(name);
                document.getElementById('new-sub-name').value = "";
                alert("Sub-sección añadida");
            }
        }

        function updateSubSelect() {
            const parent = document.getElementById('p-cat').value;
            const select = document.getElementById('p-sub');
            select.innerHTML = '<option value="General">General</option>';
            db.ref('wheeboks_system/subsections/' + parent).once('value', snap => {
                const val = snap.val();
                for(let id in val) select.innerHTML += `<option value="${val[id]}">${val[id]}</option>`;
            });
        }

        function publish() {
            const cat = document.getElementById('p-cat').value;
            db.ref('wheeboks_system/posts').push({
                title: document.getElementById('p-title').value,
                desc: document.getElementById('p-desc').value,
                cat: cat, sub: document.getElementById('p-sub').value,
                staff: user, range: range, date: new Date().toLocaleDateString()
            });
            alert("Publicado correctamente");
        }

        function openCat(id, filter = "Todo") {
            db.ref('wheeboks_system').once('value', snap => {
                const data = snap.val();
                document.getElementById('sec-title-view').innerText = data.categories[id];
                const filters = document.getElementById('sub-filters');
                filters.innerHTML = `<button class="btn" style="width:auto; font-size:10px; background:${filter === 'Todo' ? 'var(--primary)' : '#222'}" onclick="openCat('${id}', 'Todo')">Todo</button>`;
                
                const subs = data.subsections ? data.subsections[id] : {};
                for(let sid in subs) {
                    filters.innerHTML += `<button class="btn" style="width:auto; font-size:10px; background:${filter === subs[sid] ? 'var(--primary)' : '#222'}; color:${filter === subs[sid] ? '#000' : '#fff'}" onclick="openCat('${id}', '${subs[sid]}')">${subs[sid]}</button>`;
                }

                const grid = document.getElementById('render-grid'); grid.innerHTML = "";
                const posts = data.posts || {};
                for(let pid in posts) {
                    const p = posts[pid];
                    if(p.cat === id && (filter === "Todo" || p.sub === filter)) {
                        grid.innerHTML += `<div class="card"><span class="tag">${p.sub}</span><h3>${p.title}</h3><p>${p.desc}</p><div class="card-meta">Por: ${p.staff} (${p.range}) | ${p.date}</div></div>`;
                    }
                }
                goTo('section');
            });
        }

        function checkLogin() {
            if(document.getElementById('st-pass').value === "pampiano17") {
                user = document.getElementById('st-user').value;
                range = document.getElementById('st-range').value;
                document.getElementById('login-modal').style.display='none'; goTo('admin');
            } else alert("Clave Incorrecta");
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function openLogin() { toggleSidebar(); document.getElementById('login-modal').style.display='flex'; }
        function goTo(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            if(document.getElementById('sidebar').classList.contains('active')) toggleSidebar();
        }
    </script>
</body>
</html>
